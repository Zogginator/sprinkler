<!doctype html>
<html lang="hu">
<head>
  <meta charset="utf-8">
  <title>Öntöző</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <link rel="stylesheet" href="{{ url_for('static', filename='main.css') }}">
</head>
<body>
  {% if dry_run %}
  <div class="dry-run-banner">&#9888;&#65039; DRY RUN MODE &mdash; no hardware commands sent</div>
  {% endif %}
  <div class="page-header">
    <h1>Öntöző vezérlés</h1>
  </div>
  <main>
    {% block content %}{% endblock %}
  </main>
  <script>
    var _cdTimers = {};
    var _savedInputs = {};  // zone-id → saved minutes value

    function fmtTime(s) {
      return Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0');
    }

    // Save duration input values before the poll replaces the DOM
    document.addEventListener('htmx:beforeSwap', function(e) {
      if (e.detail.target && e.detail.target.id === 'zones') {
        document.querySelectorAll('[data-zone-id]').forEach(function(card) {
          var inp = card.querySelector('input[name="minutes"]');
          if (inp) _savedInputs[card.dataset.zoneId] = inp.value;
        });
      }
    });

    function syncCountdowns() {
      document.querySelectorAll('[data-zone-id]').forEach(function(card) {
        var zid = card.dataset.zoneId;
        var rem = parseInt(card.dataset.remaining, 10) || 0;
        var el = card.querySelector('.remaining');

        // Restore saved input value if present
        var inp = card.querySelector('input[name="minutes"]');
        if (inp && _savedInputs[zid] !== undefined) inp.value = _savedInputs[zid];

        if (_cdTimers[zid]) { clearInterval(_cdTimers[zid]); delete _cdTimers[zid]; }
        if (!el) return;
        if (rem <= 0) { el.classList.add('hidden'); el.textContent = ''; return; }
        el.classList.remove('hidden');
        el.textContent = fmtTime(rem);
        _cdTimers[zid] = setInterval(function() {
          rem--;
          if (rem <= 0) {
            clearInterval(_cdTimers[zid]); delete _cdTimers[zid];
            el.classList.add('hidden'); el.textContent = '';
          } else {
            el.textContent = fmtTime(rem);
          }
        }, 1000);
      });
    }

    document.addEventListener('DOMContentLoaded', syncCountdowns);
    document.addEventListener('htmx:afterSwap', function(e) {
      if (e.detail.target && e.detail.target.id === 'zones') syncCountdowns();
    });
  </script>
</body>
</html>
